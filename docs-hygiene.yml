entryDocs:
  required:
    - README.md
    - README_ZH.md
    - CHANGELOG.md
    - LICENSE
  optional:
    - AGENTS.md
    - CLAUDE.md
    - GEMINI.md
    - CONTRIBUTING.md
    - SECURITY.md

docs:
  bases:
    - id: main
      root: docs
      requireContinuousNumbering: true
      maxLines: 200
      patterns:
        - id: numbered
          regex: "^\\d{2}_[a-z0-9_-]+\\.md$"
          role: numbered
          numbered: true
        - id: index
          regex: "^INDEX\\.md$"
          role: index
          numbered: false

i18n:
  rootLang: en
  languages: [zh]
  requireDocsParity: true
  requireNumberParity: true

concepts:
  dir: concept
  requireConceptFile: true
  failOnOrphanConcept: warn

language:
  en:
    maxCjkRatio: 0.05
  zh:
    minCjkRatio: 0.15

documentContracts:
  maturity:
    declared: maintained
    recommendations:
      - level: governed
        minRepositoryLines: 20000
        minManagedDocuments: 20
  profiles:
    - id: repository-readme
      match:
        paths: [README.md, README_ZH.md]
        filenames: ["^README(?:_ZH)?\\.md$"]
      enforceFrom: maintained
      placeholdersAllowedUntil: growing
      placeholderPatterns: ["(?i)\\b(?:TODO|TBD)\\b", "待补充"]
      orderedSections: true
      requiredSections:
        - id: quick-start
          headings: [Quick Start, 快速开始]
        - id: policy
          headings: [Policy, 策略]
        - id: adapters
          headings: [Adapters, Adapter]
    - id: changelog
      match:
        paths: [CHANGELOG.md]
        filenames: ["^CHANGELOG\\.md$"]
      enforceFrom: maintained
      requiredFields:
        - id: released-version
          pattern: "(?m)^## \\d+\\.\\d+\\.\\d+(?: |$)"

adapters:
  markdownlint:
    enabled: true
    command: markdownlint-cli2
    args:
      - README.md
      - README_ZH.md
      - CHANGELOG.md
      - "docs/**/*.md"

suppressions: []

ignore:
  paths:
    - target/**
