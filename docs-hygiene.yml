entryDocs:
  required:
    - README.md
    - README_ZH.md
    - CHANGELOG.md
    - LICENSE
  optional:
    - AGENTS.md
    - CLAUDE.md
    - GEMINI.md
    - CONTRIBUTING.md
    - SECURITY.md

docs:
  bases:
    - id: main
      root: docs
      requireContinuousNumbering: true
      maxLines: 200
      ignore:
        - docs/references/**
        - docs/prd/**
        - docs/position/**
      patterns:
        - id: numbered
          regex: "^\\d{2}_[a-z0-9_-]+\\.md$"
          role: numbered
          numbered: true
        - id: index
          regex: "^INDEX\\.md$"
          role: index
          numbered: false
    - id: references
      root: docs/references
      requireContinuousNumbering: true
      maxLines: 200
      patterns:
        - id: numbered-reference
          regex: "^\\d{2}_[a-z0-9_-]+\\.md$"
          role: numbered
          numbered: true
        - id: reference-index
          regex: "^README\\.md$"
          role: index
          numbered: false
    - id: prd
      root: docs/prd
      requireContinuousNumbering: true
      maxLines: 200
      patterns:
        - id: numbered-prd
          regex: "^\\d{2}_[a-z0-9_-]+\\.md$"
          role: numbered
          numbered: true
        - id: prd-index
          regex: "^README\\.md$"
          role: index
          numbered: false
    - id: position
      root: docs/position
      requireContinuousNumbering: true
      maxLines: 200
      patterns:
        - id: numbered-position
          regex: "^\\d{2}_[a-z0-9_-]+\\.md$"
          role: numbered
          numbered: true
        - id: position-index
          regex: "^README\\.md$"
          role: index
          numbered: false

i18n:
  rootLang: en
  languages: [zh]
  requireDocsParity: true
  requireNumberParity: true

concepts:
  dir: concept
  requireConceptFile: true
  failOnOrphanConcept: warn

language:
  en:
    maxCjkRatio: 0.05
  zh:
    minCjkRatio: 0.15

documentContracts:
  maturity:
    declared: maintained
    recommendations:
      - level: governed
        minRepositoryLines: 20000
        minManagedDocuments: 20
  profiles:
    - id: product-position
      match:
        paths:
          - docs/position/[0-9][0-9]_*.md
          - docs/position/zh/[0-9][0-9]_*.md
        filenames: ["^\\d{2}_[a-z0-9_-]+\\.md$"]
      enforceFrom: maintained
      orderedSections: true
      requiredSections:
        - id: position-statement
          headings: [Position Statement, 立场主张]
        - id: model
          headings: [Model, 模型]
        - id: reference-axis
          headings: [Reference Axis, Reference 轴]
        - id: subject-axis
          headings: [Subject Axis, 主体轴]
        - id: evidence-plane
          headings: [Evidence Plane, Evidence 平面]
        - id: governance-implications
          headings: [Governance Implications, 治理含义]
        - id: boundaries
          headings: [Boundaries, 边界]
      requiredFields:
        - id: position-status
          pattern: "(?m)^(?:Status:|状态：)\\s*(?:working|adopted|superseded)$"
    - id: product-requirement
      match:
        paths:
          - docs/prd/[0-9][0-9]_*.md
          - docs/prd/zh/[0-9][0-9]_*.md
        filenames: ["^\\d{2}_[a-z0-9_-]+\\.md$"]
      enforceFrom: maintained
      placeholdersAllowedUntil: growing
      placeholderPatterns: ["(?i)\\b(?:TODO|TBD)\\b", "待补充"]
      orderedSections: true
      requiredSections:
        - id: problem
          headings: [Problem, 问题]
        - id: users-and-benefits
          headings: [Users and Benefits, 用户与收益]
        - id: semantic-dependencies
          headings: [Semantic Dependencies, 语义依赖]
        - id: requirements
          headings: [Requirements, 需求]
        - id: non-goals
          headings: [Non-goals, 非目标]
        - id: acceptance-criteria
          headings: [Acceptance Criteria, 验收标准]
        - id: delivery-status
          headings: [Delivery Status, 交付状态]
      requiredFields:
        - id: prd-id
          pattern: "(?m)^id: PRD-[0-9]+$"
        - id: lifecycle-status
          pattern: "(?m)^status: (?:draft|review|proposed|baselined|superseded|archived|abandoned)$"
        - id: ul-registry
          pattern: "(?m)^ul_registry: [a-z0-9_-]+$"
        - id: ul-version
          pattern: "(?m)^ul_version: [0-9]+\\.[0-9]+\\.[0-9]+$"
    - id: ubiquitous-language
      match:
        paths:
          - docs/references/01_ubiquitous_language.md
          - docs/references/zh/01_ubiquitous_language.md
        filenames: ["^01_ubiquitous_language\\.md$"]
      enforceFrom: maintained
      orderedSections: true
      requiredSections:
        - id: product-concepts
          headings: [Product Concepts, 产品概念]
        - id: product-actions
          headings: [Product Actions, 产品动作]
        - id: invariants
          headings: [Invariants, 不变量]
        - id: results-and-benefits
          headings: [Results and Benefits, 结果与用户收益]
        - id: change-rules
          headings: [Change Rules, 变更规则]
      requiredFields:
        - id: registry-id
          pattern: "(?m)^Registry ID(?:：|:) `docs-hygiene`$"
        - id: registry-version
          pattern: "(?m)^Registry (?:version|版本)(?:：|:) `?[0-9]+\\.[0-9]+\\.[0-9]+`?$"
    - id: repository-readme
      match:
        paths: [README.md, README_ZH.md]
        filenames: ["^README(?:_ZH)?\\.md$"]
      enforceFrom: maintained
      placeholdersAllowedUntil: growing
      placeholderPatterns: ["(?i)\\b(?:TODO|TBD)\\b", "待补充"]
      orderedSections: true
      requiredSections:
        - id: quick-start
          headings: [Quick Start, 快速开始]
        - id: policy
          headings: [Policy, 策略]
        - id: adapters
          headings: [Adapters, Adapter]
    - id: changelog
      match:
        paths: [CHANGELOG.md]
        filenames: ["^CHANGELOG\\.md$"]
      enforceFrom: maintained
      requiredFields:
        - id: released-version
          pattern: "(?m)^## \\d+\\.\\d+\\.\\d+(?: |$)"

adapters:
  markdownlint:
    enabled: true
    command: markdownlint-cli2
    args:
      - README.md
      - README_ZH.md
      - CHANGELOG.md
      - "docs/**/*.md"

suppressions: []

ignore:
  paths:
    - target/**
