entryDocs:
  required:
    - README.md
    - README_ZH.md
    - CHANGELOG.md
    - ROADMAP.md
    - LICENSE
  optional:
    - AGENTS.md
    - CLAUDE.md
    - GEMINI.md
    - CONTRIBUTING.md
    - SECURITY.md

docs:
  bases:
    - id: docs-index
      root: docs
      requireContinuousNumbering: false
      maxLines: 200
      ignore:
        - docs/guide/**
        - docs/governance/**
        - docs/capabilities/**
        - docs/migration/**
        - docs/decisions/**
        - docs/engineering/**
        - docs/position/**
        - docs/zh/guide/**
        - docs/zh/governance/**
        - docs/zh/capabilities/**
        - docs/zh/migration/**
        - docs/zh/decisions/**
        - docs/zh/engineering/**
        - docs/zh/position/**
        - docs/zh/issues/**
      patterns:
        - id: docs-index
          regex: "^README\\.md$"
          documentKind: index
          numbered: false
    - id: guide
      root: docs/guide
      localizedRoots:
        zh: docs/zh/guide
      requireContinuousNumbering: false
      maxLines: 200
      patterns:
        - id: guide-page
          regex: "^[a-z][a-z0-9-]*\\.md$"
          documentKind: guide
          numbered: false
    - id: governance-guide
      root: docs/governance
      localizedRoots:
        zh: docs/zh/governance
      requireContinuousNumbering: false
      maxLines: 200
      patterns:
        - id: governance-page
          regex: "^[a-z][a-z0-9-]*\\.md$"
          documentKind: guide
          numbered: false
    - id: capability-guide
      root: docs/capabilities
      localizedRoots:
        zh: docs/zh/capabilities
      requireContinuousNumbering: false
      maxLines: 200
      patterns:
        - id: capability-page
          regex: "^[a-z][a-z0-9-]*\\.md$"
          documentKind: guide
          numbered: false
    - id: migration-guide
      root: docs/migration
      localizedRoots:
        zh: docs/zh/migration
      requireContinuousNumbering: false
      maxLines: 200
      patterns:
        - id: migration-page
          regex: "^[a-z][a-z0-9-]*\\.md$"
          documentKind: guide
          numbered: false
    - id: decisions
      root: docs/decisions
      localizedRoots:
        zh: docs/zh/decisions
      requireContinuousNumbering: false
      maxLines: 200
      patterns:
        - id: architecture-decision
          regex: "^ADR-\\d{4}_[a-z0-9-]+\\.md$"
          documentKind: decision
          numbered: false
    - id: engineering
      root: docs/engineering
      localizedRoots:
        zh: docs/zh/engineering
      requireContinuousNumbering: true
      maxLines: 200
      ignore:
        - docs/engineering/ul/**
        - docs/zh/engineering/ul/**
        - docs/engineering/prd/**
        - docs/zh/engineering/prd/**
      patterns:
        - id: numbered-engineering
          regex: "^\\d{2}_[a-z0-9_-]+\\.md$"
          documentKind: numbered
          numbered: true
        - id: engineering-index
          regex: "^README\\.md$"
          documentKind: index
          numbered: false
    - id: engineering-library
      root: docs/engineering/ul
      localizedRoots:
        zh: docs/zh/engineering/ul
      requireContinuousNumbering: false
      maxLines: 80
      patterns:
        - id: term
          regex: "^[a-z0-9-]+\\.md$"
          documentKind: library-term
          numbered: false
    - id: engineering-prd-packages
      root: docs/engineering/prd
      localizedRoots:
        zh: docs/zh/engineering/prd
      requireContinuousNumbering: false
      maxLines: 80
      patterns:
        - id: body-item
          regex: "^[a-z0-9-]+\\.md$"
          documentKind: body-item
          numbered: false
    - id: position
      root: docs/position
      localizedRoots:
        zh: docs/zh/position
      requireContinuousNumbering: true
      maxLines: 200
      patterns:
        - id: numbered-position
          regex: "^\\d{2}_[a-z0-9_-]+\\.md$"
          documentKind: numbered
          numbered: true
        - id: position-index
          regex: "^README\\.md$"
          documentKind: index
          numbered: false

languageRepresentations:
  canonical: en
  localized: [zh]
  requireDocumentParity: true
  requireNumberParity: true

concepts:
  dir: concept
  requireConceptFile: true
  failOnOrphanConcept: warn

language:
  en:
    maxCjkRatio: 0.05
  zh:
    minCjkRatio: 0.15

hygieneProfile:
  dimensions:
    structure:
      target: governed
      required: true
    identity:
      target: controlled
      required: true
    dependency:
      target: controlled
      required: true
    topology:
      target: controlled
      required: false

documentContracts:
  maturity:
    declared: governed
    recommendations:
      - level: governed
        minProjectLines: 20000
        minManagedDocuments: 20
  templates:
    - id: maintained-open-contract
      revision: 1
      compatibleFrom: 1
      enforceFrom: maintained
      placeholdersAllowedUntil: growing
      placeholderPatterns: ["(?i)\\b(?:TODO|TBD)\\b", "待补充"]
      orderedSections: true
  profiles:
    - id: product-position
      template: maintained-open-contract
      templateRevision: 1
      match:
        paths:
          - docs/position/[0-9][0-9]_*.md
          - docs/zh/position/[0-9][0-9]_*.md
        filenames: ["^\\d{2}_[a-z0-9_-]+\\.md$"]
      requiredSections:
        - id: position-statement
          headings: [Position, 立场主张]
        - id: asset-roles
          headings: [Asset Roles, 资产角色]
        - id: reference-relation
          headings: [Reference Relation, 引用关系]
        - id: language-representation
          headings: [Language Representation, 语言表示]
        - id: governance-graph
          headings: [Governance Graph, 治理关系图]
        - id: boundaries
          headings: [Boundaries, 边界]
      requiredFields:
        - id: position-status
          pattern: "(?m)^(?:Status:|状态：)\\s*(?:working|adopted|superseded)$"
    - id: package-member
      template: maintained-open-contract
      templateRevision: 1
      match:
        paths:
          - docs/engineering/prd/**/*.md
          - docs/zh/engineering/prd/**/*.md
        filenames: ["^[a-z0-9-]+\\.md$"]
      requiredFields:
        - id: member-id
          pattern: "(?m)^id: [A-Za-z0-9._-]+$"
        - id: lifecycle-status
          pattern: "(?m)^status: (?:draft|review|proposed|baselined|superseded|archived|abandoned)$"
    - id: project-readme
      template: maintained-open-contract
      templateRevision: 1
      match:
        paths: [README.md, README_ZH.md]
        filenames: ["^README(?:_ZH)?\\.md$"]
      requiredSections:
        - id: quick-start
          headings: [Quick Start, 快速开始]
        - id: policy
          headings: [Policy, 策略]
        - id: adapters
          headings: [Adapters, Adapter]
    - id: changelog
      template: maintained-open-contract
      templateRevision: 1
      match:
        paths: [CHANGELOG.md]
        filenames: ["^CHANGELOG\\.md$"]
      requiredFields:
        - id: released-version
          pattern: "(?m)^## \\d+\\.\\d+\\.\\d+(?: |$)"
    - id: roadmap
      template: maintained-open-contract
      templateRevision: 1
      match:
        paths: [ROADMAP.md]
        filenames: ["^ROADMAP\\.md$"]
      requiredSections:
        - id: current-baseline
          headings: [Current Baseline, 当前基线]
        - id: planned
          headings: [Planned, 已计划]
        - id: backlog
          headings: [Backlog, 待办]
        - id: decision-boundaries
          headings: [Decision Boundaries, 决策边界]

governance:
  manifests:
    - docs/engineering/ul/manifest.yml
    - docs/engineering/prd/prd-001/manifest.yml
    - docs/engineering/prd/prd-002/manifest.yml
    - docs/engineering/prd/prd-003/manifest.yml
    - docs/engineering/prd/prd-004/manifest.yml
  topology:
    maxFanIn: 8
    maxFanOut: 12
    forbidCycles: true

adapters:
  markdownlint:
    enabled: true
    command: markdownlint-cli2
    args:
      - README.md
      - README_ZH.md
      - CHANGELOG.md
      - ROADMAP.md
      - "docs/**/*.md"

suppressions: []

ignore:
  paths:
    - target/**
