entryDocs:
  required:
    - README.md
    - README_ZH.md
    - CHANGELOG.md
    - ROADMAP.md
    - LICENSE
    - sdk-manifest.yml
    - implementation-manifest.yml
  optional:
    - AGENTS.md
    - CLAUDE.md
    - GEMINI.md
    - CONTRIBUTING.md
    - SECURITY.md

docs:
  bases:
    - id: main
      root: docs
      requireContinuousNumbering: true
      maxLines: 200
      ignore:
        - docs/intent/**
        - docs/definition/**
        - docs/position/**
        - docs/zh/intent/**
        - docs/zh/definition/**
        - docs/zh/position/**
      patterns:
        - id: numbered
          regex: "^\\d{2}_[a-z0-9_-]+\\.md$"
          documentKind: numbered
          numbered: true
        - id: index
          regex: "^INDEX\\.md$"
          documentKind: index
          numbered: false
    - id: intent
      root: docs/intent
      localizedRoots:
        zh: docs/zh/intent
      requireContinuousNumbering: true
      maxLines: 200
      ignore:
        - docs/intent/ul/**
        - docs/zh/intent/ul/**
        - docs/intent/prd/**
        - docs/zh/intent/prd/**
      patterns:
        - id: numbered-intent
          regex: "^\\d{2}_[a-z0-9_-]+\\.md$"
          documentKind: numbered
          numbered: true
        - id: intent-index
          regex: "^README\\.md$"
          documentKind: index
          numbered: false
    - id: definition
      root: docs/definition
      localizedRoots:
        zh: docs/zh/definition
      requireContinuousNumbering: true
      maxLines: 200
      ignore:
        - docs/definition/glossary/**
        - docs/zh/definition/glossary/**
        - docs/definition/spec/**
        - docs/zh/definition/spec/**
      patterns:
        - id: numbered-definition
          regex: "^\\d{2}_[a-z0-9_-]+\\.md$"
          documentKind: numbered
          numbered: true
        - id: definition-index
          regex: "^README\\.md$"
          documentKind: index
          numbered: false
    - id: intent-library
      root: docs/intent/ul
      localizedRoots:
        zh: docs/zh/intent/ul
      requireContinuousNumbering: false
      maxLines: 80
      patterns:
        - id: term
          regex: "^[a-z0-9-]+\\.md$"
          documentKind: library-term
          numbered: false
    - id: definition-library
      root: docs/definition/glossary
      localizedRoots:
        zh: docs/zh/definition/glossary
      requireContinuousNumbering: false
      maxLines: 80
      patterns:
        - id: term
          regex: "^[a-z0-9-]+\\.md$"
          documentKind: library-term
          numbered: false
    - id: intent-body-packages
      root: docs/intent/prd
      localizedRoots:
        zh: docs/zh/intent/prd
      requireContinuousNumbering: false
      maxLines: 80
      patterns:
        - id: body-item
          regex: "^[a-z0-9-]+\\.md$"
          documentKind: body-item
          numbered: false
    - id: definition-body-packages
      root: docs/definition/spec
      localizedRoots:
        zh: docs/zh/definition/spec
      requireContinuousNumbering: false
      maxLines: 80
      patterns:
        - id: body-item
          regex: "^[a-z0-9-]+\\.md$"
          documentKind: body-item
          numbered: false
    - id: position
      root: docs/position
      localizedRoots:
        zh: docs/zh/position
      requireContinuousNumbering: true
      maxLines: 200
      patterns:
        - id: numbered-position
          regex: "^\\d{2}_[a-z0-9_-]+\\.md$"
          documentKind: numbered
          numbered: true
        - id: position-index
          regex: "^README\\.md$"
          documentKind: index
          numbered: false

languageRepresentations:
  canonical: en
  localized: [zh]
  requireDocumentParity: true
  requireNumberParity: true

concepts:
  dir: concept
  requireConceptFile: true
  failOnOrphanConcept: warn

language:
  en:
    maxCjkRatio: 0.05
  zh:
    minCjkRatio: 0.15

documentContracts:
  maturity:
    declared: maintained
    recommendations:
      - level: governed
        minProjectLines: 20000
        minManagedDocuments: 20
  profiles:
    - id: product-position
      match:
        paths:
          - docs/position/[0-9][0-9]_*.md
          - docs/zh/position/[0-9][0-9]_*.md
        filenames: ["^\\d{2}_[a-z0-9_-]+\\.md$"]
      enforceFrom: maintained
      orderedSections: true
      requiredSections:
        - id: position-statement
          headings: [Position, 立场主张]
        - id: refinement-level
          headings: [Refinement Level, 精化层级]
        - id: reference-relation
          headings: [Reference Relation, 引用关系]
        - id: language-representation
          headings: [Language Representation, 语言表示]
        - id: governance-graph
          headings: [Governance Graph, 治理关系图]
        - id: boundaries
          headings: [Boundaries, 边界]
      requiredFields:
        - id: position-status
          pattern: "(?m)^(?:Status:|状态：)\\s*(?:working|adopted|superseded)$"
    - id: package-member
      match:
        paths:
          - docs/intent/prd/**/*.md
          - docs/zh/intent/prd/**/*.md
          - docs/definition/spec/**/*.md
          - docs/zh/definition/spec/**/*.md
        filenames: ["^[a-z0-9-]+\\.md$"]
      enforceFrom: maintained
      placeholdersAllowedUntil: growing
      placeholderPatterns: ["(?i)\\b(?:TODO|TBD)\\b", "待补充"]
      requiredFields:
        - id: member-id
          pattern: "(?m)^id: [A-Za-z0-9._-]+$"
        - id: lifecycle-status
          pattern: "(?m)^status: (?:draft|review|proposed|baselined|superseded|archived|abandoned)$"
    - id: project-readme
      match:
        paths: [README.md, README_ZH.md]
        filenames: ["^README(?:_ZH)?\\.md$"]
      enforceFrom: maintained
      placeholdersAllowedUntil: growing
      placeholderPatterns: ["(?i)\\b(?:TODO|TBD)\\b", "待补充"]
      orderedSections: true
      requiredSections:
        - id: quick-start
          headings: [Quick Start, 快速开始]
        - id: policy
          headings: [Policy, 策略]
        - id: adapters
          headings: [Adapters, Adapter]
    - id: changelog
      match:
        paths: [CHANGELOG.md]
        filenames: ["^CHANGELOG\\.md$"]
      enforceFrom: maintained
      requiredFields:
        - id: released-version
          pattern: "(?m)^## \\d+\\.\\d+\\.\\d+(?: |$)"
    - id: roadmap
      match:
        paths: [ROADMAP.md]
        filenames: ["^ROADMAP\\.md$"]
      enforceFrom: maintained
      orderedSections: true
      requiredSections:
        - id: current-baseline
          headings: [Current Baseline, 当前基线]
        - id: planned
          headings: [Planned, 已计划]
        - id: backlog
          headings: [Backlog, 待办]
        - id: decision-boundaries
          headings: [Decision Boundaries, 决策边界]

governance:
  domainFanout:
    warningAt: 15
    errorAt: 50
  manifests:
    - docs/intent/ul/manifest.yml
    - docs/intent/prd/prd-001/manifest.yml
    - docs/intent/prd/prd-002/manifest.yml
    - docs/intent/prd/prd-003/manifest.yml
    - docs/definition/glossary/manifest.yml
    - docs/definition/spec/spec-001/manifest.yml
    - docs/definition/spec/spec-002/manifest.yml
    - sdk-manifest.yml
    - implementation-manifest.yml
  requireCompleteVerticalDerivation: true

adapters:
  markdownlint:
    enabled: true
    command: markdownlint-cli2
    args:
      - README.md
      - README_ZH.md
      - CHANGELOG.md
      - ROADMAP.md
      - "docs/**/*.md"

suppressions: []

ignore:
  paths:
    - target/**
