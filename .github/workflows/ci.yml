name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install 1.85.0 --profile minimal --component clippy

      - name: Enforce source file size budgets
        run: ./scripts/check-file-size.sh

      - name: Test, including repository dogfood policy
        run: cargo +1.85.0 test --locked

      - name: Clippy
        run: cargo +1.85.0 clippy --locked --all-targets --all-features -- -D warnings
